name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix deped-leave-tracker-backend

      - name: Run linter
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Backend smoke placeholder
        run: |
          echo "No automated backend tests configured."
          echo "To add backend tests, include a `test` script in deped-leave-tracker-backend/package.json."
